<!-- ============================================ -->
<!--                 Navigation                   -->
<!-- ============================================ -->

<header id="cs-navigation">
    <div class="cs-container">
        <!--Nav Logo-->
        <a href="/" class="cs-logo" aria-label="back to home">
            <div style="width:56px; height:56px; border-radius:50%; overflow:hidden; display:inline-block;">
                <img src="/assets/svgs/RD%20logo.svg" alt="RD logo" aria-hidden="true" decoding="async" style="width:100%; height:100%; object-fit:cover; display:block;">
            </div>
        </a>
        <!--Navigation List-->
        <nav class="cs-nav" role="navigation">
            <!--Mobile Nav Toggle-->
            <button class="cs-toggle" aria-label="mobile menu toggle">
                <div class="cs-box" aria-hidden="true">
                    <span class="cs-line cs-line1" aria-hidden="true"></span>
                    <span class="cs-line cs-line2" aria-hidden="true"></span>
                    <span class="cs-line cs-line3" aria-hidden="true"></span>
                </div>
            </button>
            <!-- We need a wrapper div so we can set a fixed height on the cs-ul in case the nav list gets too long from too many dropdowns being opened and needs to have an overflow scroll. This wrapper acts as the background so it can go the full height of the screen and not cut off any overflowing nav items while the cs-ul stops short of the bottom of the screen, which keeps all nav items in view no matter how mnay there are-->
            <div class="cs-ul-wrapper">
                <ul id="cs-expanded" class="cs-ul" aria-expanded="false">
                    <li class="cs-li">
                        <a href="/" class="cs-li-link {% if page.url == "/" %} cs-active {% endif %}">
                            Home
                        </a>
                    </li>
                    <li class="cs-li">
                        <a href="/about/" class="cs-li-link {% if page.url == "/about/" %} cs-active {% endif %}">
                            Gallery
                        </a>
                    </li>
                    <!-- Projects removed -->
                    <li class="cs-li">
                        <a href="/services/" class="cs-li-link {% if page.url == "/services/" %} cs-active {% endif %}">
                            Services
                        </a>
                    </li>
                    <!-- Contact nav link removed; retained Contact Us button to the right -->
                </ul>
            </div>
        </nav>
        <a href="/contact/" class="cs-button-solid cs-nav-button">Contact Us</a>
        <a href="{{ client.socials.instagram }}" class="cs-social-link" aria-label="visit instagram" target="_blank" rel="noopener" style="filter: invert(24%) sepia(87%) saturate(1338%) hue-rotate(291deg) brightness(97%) contrast(97%); display: inline-flex; flex-direction: column; align-items: center; gap: 4px;">
            <img class="cs-social-img" aria-hidden="true" loading="lazy" decoding="async" src="/assets/svgs/instagram.svg" alt="instagram" width="20" height="20">
            <span style="font-size: 12px; color: #000;">instagram</span>
        </a>
    </div>
</header>
